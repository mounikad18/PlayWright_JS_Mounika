name: Run UI Basics Tests

on:
  pull_request:
    branches:
      - "**"

jobs:
  ui-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # If your project uses Playwright
      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run UIBasics.spec tests
        run: npx playwright test tests/UIBasics.spec.ts
